<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#141C2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF5B5B"/>
      <stop offset="1" stop-color="#E23B3B"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="1278" height="338" rx="24" fill="url(#bg)" stroke="#243049" stroke-width="2"/>

  <!-- play badge -->
  <rect x="72" y="86" width="88" height="88" rx="22" fill="url(#accent)"/>
  <path d="M106 112 L138 130 L106 148 Z" fill="#ffffff"/>

  <!-- title + tagline -->
  <text x="184" y="126" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1">YouTube Auto-Dub</text>
  <text x="186" y="168" fill="#9BB0C9" font-size="23" font-weight="500">Dub any video into another language — in the original voice.</text>
  <text x="186" y="200" fill="#35D0BA" font-size="20" font-weight="600">Local-first · open-source · runs free on your own machine</text>

  <!-- waveform accent (top-right) -->
  <g transform="translate(980,86)" fill="#35D0BA" opacity="0.9">
    <rect x="0"   y="24" width="6" height="24" rx="3"/>
    <rect x="14"  y="12" width="6" height="48" rx="3"/>
    <rect x="28"  y="2"  width="6" height="68" rx="3"/>
    <rect x="42"  y="16" width="6" height="40" rx="3"/>
    <rect x="56"  y="6"  width="6" height="60" rx="3"/>
    <rect x="70"  y="26" width="6" height="20" rx="3"/>
    <rect x="84"  y="10" width="6" height="52" rx="3" fill="#FF5B5B"/>
    <rect x="98"  y="0"  width="6" height="72" rx="3" fill="#FF5B5B"/>
    <rect x="112" y="18" width="6" height="36" rx="3" fill="#FF5B5B"/>
    <rect x="126" y="8"  width="6" height="56" rx="3" fill="#FF5B5B"/>
    <rect x="140" y="24" width="6" height="24" rx="3" fill="#FF5B5B"/>
  </g>

  <!-- pipeline chips -->
  <g font-size="17" font-weight="600" text-anchor="middle">
    <g fill="#0B1220">
      <rect x="72"  y="248" width="132" height="44" rx="12" fill="#1C2740"/>
      <rect x="232" y="248" width="150" height="44" rx="12" fill="#1C2740"/>
      <rect x="410" y="248" width="140" height="44" rx="12" fill="#1C2740"/>
      <rect x="578" y="248" width="150" height="44" rx="12" fill="#1C2740"/>
      <rect x="756" y="248" width="146" height="44" rx="12" fill="#1C2740"/>
      <rect x="930" y="248" width="118" height="44" rx="12" fill="#1C2740"/>
    </g>
    <g fill="#CFE0F2">
      <text x="138" y="276">download</text>
      <text x="307" y="276">transcribe</text>
      <text x="480" y="276">translate</text>
      <text x="653" y="276">voice clone</text>
      <text x="829" y="276">synchronize</text>
      <text x="989" y="276">mux</text>
    </g>
    <g stroke="#5A7099" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M214 264 L222 270 L214 276"/>
      <path d="M392 264 L400 270 L392 276"/>
      <path d="M560 264 L568 270 L560 276"/>
      <path d="M738 264 L746 270 L738 276"/>
      <path d="M912 264 L920 270 L912 276"/>
    </g>
  </g>
</svg>
