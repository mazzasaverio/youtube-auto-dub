name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install (light core + tooling)
        run: |
          uv venv
          uv pip install typer loguru pydantic pydantic-settings python-dotenv \
            pydub numpy soundfile pytest ruff yt-dlp
          uv pip install -e . --no-deps

      # Call the venv tools directly — NOT `uv run`, which would re-sync the whole
      # project (and try to build the un-buildable OpenVoice legacy deps).
      - name: Lint
        run: .venv/bin/ruff check src tests examples

      - name: Test
        run: .venv/bin/pytest -q
